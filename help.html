<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, height=320, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Help</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone-screen">
    <header class="top-bar">
      <span>Help Guide</span>
      <span></span>
    </header>

    <main class="placeholder-content">
      <h1>Key Bindings</h1>
      <p><b>D-Pad:</b> Scroll viewport</p>
      <p><b>* Key:</b> Prev Page</p>
      <p><b># Key:</b> Next Page</p>
      <p><b>2 Key:</b> Zoom In</p>
      <p><b>8 Key:</b> Zoom Out</p>
    </main>

    <footer class="bottom-bar">
      <span></span>
      <span id="softkey-right">Back</span>
    </footer>
  </div>

  <script>
    window.addEventListener('keydown', (e) => {
      if (e.key === 'SoftRight' || e.key === 'F2' || e.key === 'Backspace' || e.key === 'Escape') {
        e.preventDefault();
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
